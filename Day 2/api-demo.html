<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>ZecPath API Demo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .header {
            padding: 30px 20px;
            background-color: #5b5fef;
            color: white;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 8px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 50px 20px;
        }

        .fetch-button {
            display: block;
            margin: 0 auto 30px;
            padding: 13px 28px;

            border: none;
            border-radius: 8px;

            background-color: #5b5fef;
            color: white;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;
        }

        .fetch-button:hover {
            background-color: #464ad6;
        }

        .loader {
            display: none;
            text-align: center;
            color: #5b5fef;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .error-message {
            color: red;
            text-align: center;
            margin-bottom: 20px;
        }

        /* User cards container */
        .user-container {
            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(250px, 1fr));

            gap: 20px;
        }

        .user-card {
            padding: 24px;

            background-color: white;

            border: 1px solid #e2e8f0;
            border-top: 4px solid #5b5fef;
            border-radius: 12px;

            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .user-card h2 {
            color: #1e293b;
            font-size: 21px;
            margin-bottom: 12px;
        }

        .user-card p {
            color: #64748b;
            margin-bottom: 7px;
        }

        @media screen and (max-width: 480px) {
            .header h1 {
                font-size: 26px;
            }

            .container {
                padding: 35px 16px;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>ZecPath API Demo</h1>

        <p>Fetch and display users using JavaScript</p>
    </header>

    <main class="container">

        <button
            class="fetch-button"
            id="fetchButton"
        >
            Load Users
        </button>

        <p class="loader" id="loader">
            Loading users...
        </p>

        <!-- Error message -->
        <p
            class="error-message"
            id="errorMessage"
        ></p>

        <section
            class="user-container"
            id="userContainer"
        ></section>

    </main>

    <script>
        const fetchButton =
            document.getElementById("fetchButton");

        const loader =
            document.getElementById("loader");

        const errorMessage =
            document.getElementById("errorMessage");

        const userContainer =
            document.getElementById("userContainer");


        const getUsers = async () => {

            loader.style.display = "block";

            errorMessage.textContent = "";

            userContainer.innerHTML = "";

            try {
                // Fetch data from API
                const response = await fetch(
                    "https://jsonplaceholder.typicode.com/users"
                );

                if (response.ok === false) {
                    throw new Error("Unable to fetch users");
                }

                const users = await response.json();

                users.forEach((user) => {

                    // Destructuring
                    const {
                        name,
                        email,
                        phone,
                        company
                    } = user;

                    const userCard =
                        document.createElement("article");

                    userCard.className = "user-card";

                    userCard.innerHTML = `
                        <h2>${name}</h2>
                        <p><strong>Email:</strong> ${email}</p>
                        <p><strong>Phone:</strong> ${phone}</p>
                        <p>
                            <strong>Company:</strong>
                            ${company.name}
                        </p>
                    `;

                    userContainer.appendChild(userCard);
                });

            } catch (error) {

                errorMessage.textContent =
                    "Something went wrong. Please try again.";

                console.log(error);

            } finally {

                loader.style.display = "none";
            }
        };


        fetchButton.addEventListener("click", getUsers);
    </script>

</body>

</html>
